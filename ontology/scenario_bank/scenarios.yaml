# Scenario Bank for Paper 1 — Software Evolution Ontology (SEO)
# 20 evolution scenarios with known ground-truth outcomes for ontology validation.
# Each scenario simulates a repo snapshot and declares expected inferences.
#
# Fields:
#   id: unique scenario identifier
#   name: descriptive name
#   description: what this scenario represents
#   repo_snapshot: simulated repository state
#     months: list of monthly data points (oldest first)
#       - month: ISO date (YYYY-MM)
#         loc: lines of code
#         commits: number of commits
#         complexity_avg: average cyclomatic complexity
#         dependency_count: number of dependencies
#         agent_commit_ratio: fraction of commits by coding agents (0.0-1.0)
#         new_features: number of new feature commits
#         bug_fixes: number of bug fix commits
#         refactorings: number of refactoring commits
#   expected_phase: growth | stabilization | decline
#   expected_law_conformance: mapping of Lehman's 8 laws to boolean
#     I   - Continuing Change
#     II  - Increasing Complexity
#     III - Self Regulation
#     IV  - Conservation of Organisational Stability
#     V   - Conservation of Familiarity
#     VI  - Continuing Growth
#     VII - Declining Quality
#     VIII - Feedback System
#   expected_patterns: list of evolution pattern names

scenarios:

  # ============================================================
  # Scenarios 1-5: Clear Growth Phase
  # ============================================================

  - id: scenario_01
    name: "Greenfield Rapid Growth"
    description: >
      A new open-source project experiencing explosive growth. LOC doubles every
      few months, many new features, low complexity (still small), few agents.
    repo_snapshot:
      months:
        - { month: "2025-01", loc: 2000, commits: 45, complexity_avg: 2.1, dependency_count: 8, agent_commit_ratio: 0.0, new_features: 30, bug_fixes: 10, refactorings: 5 }
        - { month: "2025-02", loc: 4200, commits: 62, complexity_avg: 2.3, dependency_count: 12, agent_commit_ratio: 0.0, new_features: 42, bug_fixes: 12, refactorings: 8 }
        - { month: "2025-03", loc: 7500, commits: 78, complexity_avg: 2.5, dependency_count: 15, agent_commit_ratio: 0.02, new_features: 55, bug_fixes: 14, refactorings: 9 }
        - { month: "2025-04", loc: 12000, commits: 95, complexity_avg: 2.8, dependency_count: 19, agent_commit_ratio: 0.03, new_features: 68, bug_fixes: 16, refactorings: 11 }
        - { month: "2025-05", loc: 18500, commits: 110, complexity_avg: 3.0, dependency_count: 22, agent_commit_ratio: 0.05, new_features: 80, bug_fixes: 18, refactorings: 12 }
        - { month: "2025-06", loc: 26000, commits: 130, complexity_avg: 3.2, dependency_count: 26, agent_commit_ratio: 0.05, new_features: 95, bug_fixes: 20, refactorings: 15 }
    expected_phase: growth
    expected_law_conformance:
      I: true
      II: true
      III: true
      IV: true
      V: true
      VI: true
      VII: true
      VIII: true
    expected_patterns: []

